<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDI Prediction Result</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(15, 32, 67, 0.85), rgba(15, 32, 67, 0.85)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .result-container {
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        h2 {
            color: #ff9f1c;
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .subtitle {
            color: #cbdfbd;
            font-size: 1rem;
            margin-bottom: 35px;
            font-style: italic;
        }
        .prediction-value {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #ff9f1c;
            border-right: 4px solid #ff9f1c;
            padding: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 6px;
            margin: 20px 0 40px 0;
            letter-spacing: 0.5px;
        }
        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: #00b4d8;
            border: 2px solid #00b4d8;
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #00b4d8;
            color: #0a0f1e;
            box-shadow: 0 0 15px rgba(0, 180, 216, 0.4);
        }
    </style>
</head>
<body>

    <div class="result-container">
        <h2>Human Development Index</h2>
        <div class="subtitle">A machine learning web application using Flask</div>
        
        <div class="prediction-value">
            {{ prediction_text }}
        </div>
        
        <a href="/Prediction" class="back-btn">← Run Another Analysis</a>
    </div>

</body>
</html>
